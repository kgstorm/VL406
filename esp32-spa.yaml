substitutions:
  version: "2.0"

esphome:
  name: vl406
  friendly_name: vl406
  name_add_mac_suffix: true
  project:
    name: "kgstorm.vl406"
    version: ${version}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

update:
  - platform: http_request
    name: "Firmware Update"
    source: https://kgstorm.github.io/VL406/firmware/manifest.json
    update_interval: 6h
  
# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request
    id: ota_http

wifi:
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "VL406 Fallback Hotspot"
    password: !secret ap_password

logger:

captive_portal:

http_request:
  useragent: esphome/vl406
  timeout: 20s
  buffer_size_rx: 2048
  buffer_size_tx: 1024
  redirect_limit: 5

globals:
  - id: display_is_fahrenheit
    type: bool
    restore_value: true
    initial_value: 'false'

external_components:
  - source: esp32-spa
  
text_sensor:
  - platform: inputs
    parent_id: display_handler
    type: error_code
    name: "Spa Error Code"
  - platform: inputs
    parent_id: display_handler
    type: spa_mode
    name: "Spa Mode"

# ===== HOT TUB DISPLAY INPUTS =====
sensor:
  - platform: inputs
    id: display_handler
    measured_temp:
      name: "Spa Measured Temp"
      id: spa_measured_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: temperature
      filters:
        - lambda: |-
            if (id(display_is_fahrenheit)) return (x - 32.0f) * 5.0f / 9.0f;
            return x;
    set_temp:
      name: "Spa Set Temp"
      id: spa_set_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: temperature
      filters:
        - lambda: |-
            if (id(display_is_fahrenheit)) return (x - 32.0f) * 5.0f / 9.0f;
            return x;

binary_sensor:
  - platform: inputs
    parent_id: display_handler
    type: heater
    name: "Spa Heater Status"
  - platform: inputs
    parent_id: display_handler
    type: pump
    name: "Spa Pump Status"
  - platform: inputs
    parent_id: display_handler
    type: light
    name: "Spa Light Status"

select:
  - platform: template
    name: "Spa Display Unit"
    id: spa_display_unit
    icon: "mdi:thermometer"
    options:
      - "°C"
      - "°F"
    initial_option: "°C"
    restore_value: true
    optimistic: true
    on_value:
      - globals.set:
          id: display_is_fahrenheit
          value: !lambda 'return x == "°F";'

# ===== BUTTONS (GPIO outputs) =====
output:
  - platform: gpio
    id: spa_warm_out
    pin: 25
    inverted: false
  - platform: gpio
    id: spa_cool_out
    pin: 26
    inverted: false
  - platform: gpio
    id: spa_lights_out
    pin: 27
    inverted: false
  - platform: gpio
    id: spa_pumps_out
    pin: 32
    inverted: false

button:
  - platform: template
    id: btn_warm
    name: "Spa Warm"
    icon: "mdi:thermometer-plus"
    on_press:
      - logger.log: "Button pressed: WARM"
      - output.turn_on: spa_warm_out
      - delay: 100ms
      - output.turn_off: spa_warm_out

  - platform: template
    id: btn_cool
    name: "Spa Cool"
    icon: "mdi:thermometer-minus"
    on_press:
      - logger.log: "Button pressed: COOL"
      - output.turn_on: spa_cool_out
      - delay: 100ms
      - output.turn_off: spa_cool_out

  - platform: template
    id: btn_light
    name: "Spa Lights"
    icon: "mdi:lightbulb"
    on_press:
      - logger.log: "Button pressed: LIGHTS"
      - output.turn_on: spa_lights_out
      - delay: 100ms
      - output.turn_off: spa_lights_out

  - platform: template
    id: btn_pump
    name: "Spa Pumps"
    icon: "mdi:pump"
    on_press:
      - logger.log: "Button pressed: PUMPS"
      - output.turn_on: spa_pumps_out
      - delay: 100ms
      - output.turn_off: spa_pumps_out