substitutions:
  UNITS: "F"  # F, or C
  version: "1.2.3"  # overridden by CI on release

esphome:
  name: vl406
  friendly_name: vl406
  name_add_mac_suffix: true
  project:
    name: "kgstorm.vl406"
    version: ${version}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

update:
  - platform: http_request
    name: "Firmware Update"
    source: https://kgstorm.github.io/VL406/firmware/manifest.json
    update_interval: 6h
  
# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request
    id: ota_http

wifi:
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "VL406 Fallback Hotspot"
    password: !secret ap_password

captive_portal:

logger:

http_request:
  useragent: esphome/esp32-spa
  timeout: 20s
  buffer_size_rx: 2048
  buffer_size_tx: 1024
  redirect_limit: 5

external_components:
  - source: esp32-spa
  
text_sensor:
  - platform: inputs
    parent_id: display_handler
    type: error_code
    name: "Spa Error Code"

# ===== HOT TUB DISPLAY INPUTS =====
sensor:
  - platform: inputs
    id: display_handler
    measured_temp:
      name: "Spa Measured Temp"
      id: spa_measured_temp
      unit_of_measurement: "°${UNITS}"
      accuracy_decimals: 0
      device_class: temperature
    set_temp:
      name: "Spa Set Temp"
      id: spa_set_temp
      unit_of_measurement: "°${UNITS}"
      accuracy_decimals: 0
      device_class: temperature

binary_sensor:
  - platform: inputs
    parent_id: display_handler
    type: heater
    name: "Spa Heater Status"
  - platform: inputs
    parent_id: display_handler
    type: pump
    name: "Spa Pump Status"
  - platform: inputs
    parent_id: display_handler
    type: light
    name: "Spa Light Status"

# ===== BUTTONS (GPIO outputs) =====
output:
  - platform: gpio
    id: spa_warm_out
    pin: 25
    inverted: false
  - platform: gpio
    id: spa_cool_out
    pin: 26
    inverted: false
  - platform: gpio
    id: spa_lights_out
    pin: 27
    inverted: false
  - platform: gpio
    id: spa_pumps_out
    pin: 32
    inverted: false

button:
  - platform: template
    id: btn_warm
    name: "Spa Warm"
    icon: "mdi:thermometer-plus"
    on_press:
      - logger.log: "Button pressed: WARM"
      - output.turn_on: spa_warm_out
      - delay: 100ms
      - output.turn_off: spa_warm_out

  - platform: template
    id: btn_cool
    name: "Spa Cool"
    icon: "mdi:thermometer-minus"
    on_press:
      - logger.log: "Button pressed: COOL"
      - output.turn_on: spa_cool_out
      - delay: 100ms
      - output.turn_off: spa_cool_out

  - platform: template
    id: btn_light
    name: "Spa Lights"
    icon: "mdi:lightbulb"
    on_press:
      - logger.log: "Button pressed: LIGHTS"
      - output.turn_on: spa_lights_out
      - delay: 100ms
      - output.turn_off: spa_lights_out

  - platform: template
    id: btn_pump
    name: "Spa Pumps"
    icon: "mdi:pump"
    on_press:
      - logger.log: "Button pressed: PUMPS"
      - output.turn_on: spa_pumps_out
      - delay: 100ms
      - output.turn_off: spa_pumps_out