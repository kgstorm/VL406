substitutions:
  UNITS: "F"  # F, or C
  version: "1.1.9"  # overridden by CI on release

esphome:
  name: vl406
  friendly_name: vl406
  name_add_mac_suffix: true
  project:
    name: "kgstorm.vl406"
    version: ${version}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

update:
  - platform: http_request
    name: "Firmware Update"
    source: https://kgstorm.github.io/VL406/firmware/manifest.json
    update_interval: 6h
  
# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request
    id: ota_http

wifi:
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "VL406 Fallback Hotspot"
    password: !secret ap_password

logger:

captive_portal:

http_request:
  useragent: esphome/vl406
  timeout: 20s
  buffer_size_rx: 2048
  buffer_size_tx: 1024
  redirect_limit: 5

mqtt:
  id: mqtt_client
  broker: !secret mqtt_host
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password
  certificate_authority: !secret mqtt_ca_cert
  discovery: false
  topic_prefix: null
  birth_message:
  will_message:
  shutdown_message:
  log_topic:
  on_connect:
    - lambda: |-
        std::string device(App.get_name().c_str());

        // Subscribe to per-device command topics exactly once (guard against reconnects).
        static bool subscribed = false;
        if (subscribed) return;
        subscribed = true;

        id(mqtt_client).subscribe("spa/" + device + "/cmd/button",
          [device](const std::string &topic, const std::string &payload) {
            std::string btn = payload;
            if (btn.rfind("button=", 0) == 0) btn = btn.substr(7);
            bool ok = false;
            if      (btn == "warm")  { id(btn_warm).press();  ok = true; }
            else if (btn == "cool")  { id(btn_cool).press();  ok = true; }
            else if (btn == "light") { id(btn_light).press(); ok = true; }
            else if (btn == "pump")  { id(btn_pump).press();  ok = true; }
            char ack[160];
            snprintf(ack, sizeof(ack),
              "{\"ok\":%s,\"action\":\"button\",\"detail\":\"%s\"}",
              ok ? "true" : "false", btn.c_str());
            id(mqtt_client).publish(device + "/status/ack", std::string(ack), 0, false);
          }, 0);

        id(mqtt_client).subscribe("spa/" + device + "/cmd/raw_request",
          [device](const std::string &topic, const std::string &payload) {
            id(mqtt_client).publish(device + "/status/raw", id(spa_raw_frame).state, 0, false);
          }, 0);

        id(mqtt_client).subscribe("spa/" + device + "/cmd/reboot",
          [device](const std::string &topic, const std::string &payload) {
            id(mqtt_client).publish(device + "/status/ack",
              std::string("{\"ok\":true,\"action\":\"reboot\",\"detail\":\"rebooting\"}"), 0, false);
            esphome::delay(500);
            App.safe_reboot();
          }, 0);
    - delay: 5000ms
    - lambda: |-
        std::string device(App.get_name().c_str());
        bool boot_ok = id(mqtt_client).publish("spa/status/boot",
          std::string("{\"device_id\":\"") + device +
          std::string("\",\"fw_version\":\"${version}\",\"event\":\"boot\"}"), 1, true);
        if (boot_ok) {
          ESP_LOGI("mqtt_boot", "Published boot event to spa/status/boot for %s", device.c_str());
        } else {
          ESP_LOGW("mqtt_boot", "Failed to publish boot event to spa/status/boot after connect delay");
        }

external_components:
  - source: esp32-spa
  
text_sensor:
  - platform: inputs
    parent_id: display_handler
    type: error_code
    name: "Spa Error Code"
  - platform: inputs
    parent_id: display_handler
    type: raw_frame
    name: "Spa Raw Frame"
    id: spa_raw_frame

# ===== HOT TUB DISPLAY INPUTS =====
sensor:
  - platform: inputs
    id: display_handler
    measured_temp:
      name: "Spa Measured Temp"
      id: spa_measured_temp
      unit_of_measurement: "°${UNITS}"
      accuracy_decimals: 0
      device_class: temperature
    set_temp:
      name: "Spa Set Temp"
      id: spa_set_temp
      unit_of_measurement: "°${UNITS}"
      accuracy_decimals: 0
      device_class: temperature

binary_sensor:
  - platform: inputs
    parent_id: display_handler
    type: heater
    name: "Spa Heater Status"
  - platform: inputs
    parent_id: display_handler
    type: pump
    name: "Spa Pump Status"
  - platform: inputs
    parent_id: display_handler
    type: light
    name: "Spa Light Status"

# ===== BUTTONS (GPIO outputs) =====
output:
  - platform: gpio
    id: spa_warm_out
    pin: 25
    inverted: false
  - platform: gpio
    id: spa_cool_out
    pin: 26
    inverted: false
  - platform: gpio
    id: spa_lights_out
    pin: 27
    inverted: false
  - platform: gpio
    id: spa_pumps_out
    pin: 32
    inverted: false

button:
  - platform: template
    id: btn_warm
    name: "Spa Warm"
    icon: "mdi:thermometer-plus"
    on_press:
      - output.turn_on: spa_warm_out
      - delay: 100ms
      - output.turn_off: spa_warm_out

  - platform: template
    id: btn_cool
    name: "Spa Cool"
    icon: "mdi:thermometer-minus"
    on_press:
      - output.turn_on: spa_cool_out
      - delay: 100ms
      - output.turn_off: spa_cool_out

  - platform: template
    id: btn_light
    name: "Spa Lights"
    icon: "mdi:lightbulb"
    on_press:
      - output.turn_on: spa_lights_out
      - delay: 100ms
      - output.turn_off: spa_lights_out

  - platform: template
    id: btn_pump
    name: "Spa Pumps"
    icon: "mdi:pump"
    on_press:
      - output.turn_on: spa_pumps_out
      - delay: 100ms
      - output.turn_off: spa_pumps_out