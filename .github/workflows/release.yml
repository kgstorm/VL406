name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Extract version from tag (strip leading 'v')
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create secrets.yaml for build
        env:
          API_KEY: ${{ secrets.RELEASE_API_KEY }}
          OTA_PASSWORD: ${{ secrets.RELEASE_OTA_PASSWORD }}
          AP_PASSWORD: ${{ secrets.RELEASE_AP_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import os
          lines = [
              f'api_key: "{os.environ["API_KEY"]}"',
              f'ota_password: "{os.environ["OTA_PASSWORD"]}"',
              f'ap_password: "{os.environ["AP_PASSWORD"]}"',
          ]
          with open("secrets.yaml", "w") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

      - name: Build firmware
        run: esphome -s version "${{ steps.version.outputs.VERSION }}" compile esp32-spa.yaml

      - name: Locate firmware binary
        id: firmware
        run: |
          BIN=$(find .esphome/build -name "firmware.ota.bin" | head -1)
          echo "Found: $BIN"
          OUTNAME="vl406-${{ steps.version.outputs.VERSION }}.bin"
          cp "$BIN" "$OUTNAME"
          echo "FILENAME=$OUTNAME" >> $GITHUB_OUTPUT

      - name: Compute MD5
        id: md5
        run: echo "MD5=$(md5sum ${{ steps.firmware.outputs.FILENAME }} | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.firmware.outputs.FILENAME }}
            dist/spa-control-card.js
          generate_release_notes: true
          name: "Release ${{ github.ref_name }}"
    
      - name: Update manifest.json
        run: |
          python3 - << 'PYEOF'
          import json, os, pathlib

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          md5 = os.environ["MD5"]
          filename = os.environ["FILENAME"]
          repo = "https://github.com/kgstorm/VL406"

          pathlib.Path("firmware").mkdir(parents=True, exist_ok=True)

          manifest = {
              "name": "kgstorm.vl406",
              "version": version,
              "builds": [
                  {
                      "chipFamily": "ESP32",
                      "ota": {
                          "md5": md5,
                          "path": filename,
                          "summary": f"See release notes for details.",
                          "release_url": f"{repo}/releases/tag/{tag}",
                      },
                  }
              ],
          }
          with open("firmware/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ github.ref_name }}
          MD5: ${{ steps.md5.outputs.MD5 }}
          FILENAME: ${{ steps.firmware.outputs.FILENAME }}

      - name: Stage firmware files for Pages
        run: |
          cp "${{ steps.firmware.outputs.FILENAME }}" "firmware/${{ steps.firmware.outputs.FILENAME }}"

      - name: Publish firmware to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./firmware
          destination_dir: firmware
          keep_files: true
